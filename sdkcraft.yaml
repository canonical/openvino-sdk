name: openvino
base: ubuntu@24.04
summary: Intel's OpenVINO Toolkit
description: |
  This SDK provides the Intel OpenVINO™ Runtime, Python bindings, and Intel GPU driver support
  for AI inference workloads in Workshop. OpenVINO runs on CPU by default; the gpu plug enables
  hardware-accelerated inference on compatible Intel GPUs. arm64 is listed as a build target but
  is experimental and untested.

adopt-info: openvino

platforms:
  arm64:
  amd64:

slots:
  openvino-libs:
    interface: mount
    workshop-source: $SDK

plugs:
  gpu:
    interface: gpu

parts:
  openvino:
    plugin: cmake
    source-type: local
    source: .
    cmake-parameters:
      - -DENABLE_PYTHON=ON
      - -DPython3_EXECUTABLE=/usr/bin/python3.12
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DENABLE_SYSTEM_TBB=ON
      - -DENABLE_SYSTEM_SNAPPY=ON
      - -DENABLE_SNAPPY_COMPRESSION=ON
      - -DCPACK_GENERATOR=DEB
      - -DENABLE_SAMPLES=OFF
      - -DENABLE_PYTHON_PACKAGING=ON
      - -DOPENVINO_EXTRA_MODULES=./openvino.genai
      - -DCPACK_ARCHIVE_COMPONENT_INSTALL=OFF
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      git clone -b "$VERSION" --recursive \
        https://github.com/openvinotoolkit/openvino.git .
      git clone -b "$VERSION.0" --recursive \
        https://github.com/openvinotoolkit/openvino.genai.git
      # apply pybind11 fix to openvino.genai
      # https://github.com/openvinotoolkit/openvino.genai/pull/3915
      cd openvino.genai
      git remote add frenchwr https://github.com/frenchwr/openvino.genai.git
      git fetch frenchwr frenchwr/pybind11-fix
      git cherry-pick b67a24ed9a2ca0960925b4b3507d0b2eabaa0357
      cd ..
      craftctl default
    override-build: |
      # openvino build requires recent version of setuptools
      pip install --upgrade setuptools --break-system-packages
      craftctl default
    build-packages:
      - ca-certificates
      - file
      - build-essential
      - ninja-build
      - scons
      - ccache
      - pkgconf
      - git
      - shellcheck
      - patchelf
      - fdupes
      - gzip
      - lintian
      - libtbb-dev
      - libpugixml-dev
      - ocl-icd-opencl-dev
      - opencl-headers
      - rapidjson-dev
      - libva-dev
      - libsnappy-dev
      - python3-pip
      - python3-venv
      - python3-setuptools
      - libpython3-dev
      - pybind11-dev
      - libffi-dev
      - python3-enchant
      - wget
      - libsnappy-dev
  openvino-deps:
    source: .
    plugin: python
    python-packages:
      - numpy==2.2.6
      - packaging==25.0
    organize:
      lib/python3.12/site-packages/numpy: usr/lib/python3/dist-packages/numpy
      lib/python3.12/site-packages/numpy.libs: usr/lib/python3/dist-packages/numpy.libs
      lib/python3.12/site-packages/packaging: usr/lib/python3/dist-packages/packaging
  openvino-tokenizers:
    # build openvino_tokenizers from source to ensure binary compatability with openvino
    after: [openvino]
    source-type: local
    source: .
    plugin: nil
    build-packages:
    - libtbb-dev
    build-environment:
      - OpenVINO_DIR: $CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/cmake
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      git clone -b "$VERSION.0" --recursive \
        https://github.com/openvinotoolkit/openvino_tokenizers .
      craftctl default
    override-build: |
      # note, extra-index-url is needed for build dependencies only
      pip install --break-system-packages --no-deps . --extra-index-url https://storage.openvinotoolkit.org/simple/wheels/nightly
      cp -r $CRAFT_PART_BUILD/python $CRAFT_PART_INSTALL
    organize:
      python/openvino_tokenizers: usr/lib/python3/dist-packages/openvino_tokenizers
